<style>
    :root {
--border-color: #cacaca;
--background-color: #ffffff;

--background-box-title: #f7f7f7;
}
footer.footer{
    display: none !important;
}

html, body {
margin: 0px;
padding: 0px;
width: 100vw;
height: 100vh;
overflow: hidden;
font-family: 'Roboto', sans-serif;
}

header {
height: 66px;
border-bottom: 1px solid var(--border-color);
padding-left: 20px;
}
header h2 {
margin: 0px;
line-height: 66px;
}
header a {
color: black;
}
.them-edit-link {
position: absolute;
top: 10px;
right: 100px;
color: black;
font-size: 40px;
}
.them-edit-link a {
text-decoration: none;
}

.github-link{
position: absolute;
top: 10px;
right: 20px;
color: black;
}

.wrapper {
width: 100%;
height: calc(100vh - 67px);
display: flex;
}

.col {
overflow: auto;
width: 300px;
height: 100%;
border-right: 1px solid var(--border-color);
}

.drag-drawflow {
line-height: 50px;
border-bottom: 1px solid var(--border-color);
padding-left: 20px;
cursor: move;
user-select: none;
font-size: 16px;
font-weight: 400;
line-height: 24px;
color: rgb(42, 45, 52);
}



.menu {
position: absolute;
height: 40px;
display: block;
background: white;
width: 100%;
}
.menu ul {
padding: 0px;
margin: 0px;
line-height: 40px;
}

.menu ul li {
display: inline-block;
margin-left: 10px;
border-right: 1px solid var(--border-color);
padding-right: 10px;
line-height: 40px;
cursor: pointer;
}

.menu ul li.selected {
font-weight: bold;
}

.btn-export {
float: right;
position: absolute;
top: 10px;
right: 10px;
color: white;
font-weight: bold;
border: 1px solid #0e5ba3;
background: #4ea9ff;
padding: 5px 10px;
border-radius: 4px;
cursor: pointer;
z-index: 5;
}

.btn-clear {
float: right;
position: absolute;
top: 10px;
right: 85px;
color: white;
font-weight: bold;
border: 1px solid #96015b;
background: #e3195a;
padding: 5px 10px;
border-radius: 4px;
cursor: pointer;
z-index: 5;
}
.swal-wide{
width:80% !important;
}

.btn-lock {
float: right;
position: absolute;
bottom: 10px;
right: 140px;
display: flex;
font-size: 24px;
color: white;
padding: 5px 10px;
background: #555555;
border-radius: 4px;
border-right: 1px solid var(--border-color);
z-index: 5;
cursor: pointer;
}

.bar-zoom {
float: right;
position: absolute;
bottom: 10px;
right: 10px;
display: flex;
font-size: 24px;
color: white;
padding: 5px 10px;
background: #555555;
border-radius: 4px;
border-right: 1px solid var(--border-color);
z-index: 5;
}
.bar-zoom svg {
cursor: pointer;
padding-left: 10px;
}
.bar-zoom svg:nth-child(1) {
padding-left: 0px;
}

#drawflow {
margin-top:30px;
position: relative;
width: calc(100vw - 301px);
height: calc(100% - 50px);
top: 40px;
background: var(--background-color);
background-size: 25px 25px;
background-image:
linear-gradient(to right, #f1f1f1 1px, transparent 1px),
linear-gradient(to bottom, #f1f1f1 1px, transparent 1px);
}

@media only screen and (max-width: 768px) {
.col {
width: 50px;
}
.col .drag-drawflow span {
display:none;
}
#drawflow {
width: calc(100vw - 51px);
}
}



/* Editing Drawflow */

.drawflow .drawflow-node {
background: var(--background-color);
border: 1px solid var(--border-color);
-webkit-box-shadow: 0 2px 15px 2px var(--border-color);
box-shadow: 0 2px 15px 2px var(--border-color);
padding: 0px;
width: 200px;
}

.drawflow .drawflow-node.selected  {
background: white;
border: 1px solid #4ea9ff;
-webkit-box-shadow: 0 2px 20px 2px #4ea9ff;
box-shadow: 0 2px 20px 2px #4ea9ff;
}

.drawflow .drawflow-node.selected .title-box {
color: #22598c;
/*border-bottom: 1px solid #4ea9ff;*/
}

.drawflow .connection .main-path {
stroke: #4ea9ff;
stroke-width: 3px;
}

.drawflow .drawflow-node .input, .drawflow .drawflow-node .output {
height: 15px;
width: 15px;
border: 2px solid var(--border-color);
}

.drawflow .drawflow-node .input:hover, .drawflow .drawflow-node .output:hover {
background: #4ea9ff;
}

.drawflow .drawflow-node .output {
right: 10px;
}

.drawflow .drawflow-node .input {
left: -10px;
background: white;
}

.drawflow > .drawflow-delete {
border: 2px solid #43b993;
background: white;
color: #43b993;
-webkit-box-shadow: 0 2px 20px 2px #43b993;
box-shadow: 0 2px 20px 2px #43b993;
}

.drawflow-delete {
border: 2px solid #4ea9ff;
background: white;
color: #4ea9ff;
-webkit-box-shadow: 0 2px 20px 2px #4ea9ff;
box-shadow: 0 2px 20px 2px #4ea9ff;
}

.drawflow-node .title-box {
height: 50px;
line-height: 50px;
background: var(--background-box-title);
border-bottom: 1px solid #e9e9e9;
border-radius: 4px 4px 0px 0px;
padding-left: 10px;
}
.drawflow .title-box svg {
position: initial;
}
.drawflow-node .box {
padding: 10px 20px 20px 20px;
font-size: 14px;
color: #555555;

}
.drawflow-node .box p {
margin-top: 5px;
margin-bottom: 5px;
}

.drawflow-node.welcome {
width: 250px;
}

.drawflow-node.slack .title-box {
border-radius: 4px;
}

.drawflow-node input, .drawflow-node select, .drawflow-node textarea {
border-radius: 4px;
border: 1px solid var(--border-color);
height: 30px;
line-height: 30px;
font-size: 16px;
width: 158px;
color: #555555;
}

.drawflow-node textarea {
height: 100px;
}


.drawflow-node.personalized {
background: red;
height: 200px;
text-align: center;
color: white;
}
.drawflow-node.personalized .input {
background: yellow;
}
.drawflow-node.personalized .output {
background: green;
}

.drawflow-node.personalized.selected {
background: blue;
}

.drawflow .connection .point {
stroke: var(--border-color);
stroke-width: 2;
fill: white;

}

.drawflow .connection .point.selected, .drawflow .connection .point:hover {
fill: #4ea9ff;
}

/* Modal */
.modal {
display: none;
position: fixed;
z-index: 7;
left: 0;
top: 0;
width: 100vw;
height: 100vh;
overflow: auto;
background-color: rgb(0,0,0);
background-color: rgba(0,0,0,0.7);

}

.modal-content {
position: relative;
background-color: #fefefe;
margin: 15% auto; /* 15% from the top and centered */  
padding: 20px;
border: 1px solid #888;
width: 400px; /* Could be more or less, depending on screen size */
}

/* The Close Button */
.modal .close {
color: #aaa;
float: right;
font-size: 28px;
font-weight: bold;
cursor:pointer;
}

@media only screen and (max-width: 768px) {
.modal-content {
width: 80%;
}
}

  var elements = document.getElementsByClassName('drag-drawflow');
  for (var i = 0; i < elements.length; i++) {
    elements[i].addEventListener('touchend', drop, false);
    elements[i].addEventListener('touchmove', positionMobile, false);
    elements[i].addEventListener('touchstart', drag, false );
  }

  var mobile_item_selec = '';
  var mobile_last_move = null;
 function positionMobile(ev) {
   mobile_last_move = ev;
 }

 function allowDrop(ev) {
    ev.preventDefault();

  var currentDragData = null;

  function drag(ev) {
    if (ev.type === "touchstart") {
      mobile_item_selec = ev.target.closest(".drag-drawflow").getAttribute('data-node');
    } else {
      currentDragData = ev.target.dataset;
    ev.dataTransfer.setData("node", ev.target.getAttribute('data-node'));

    }
  }

 // Function to get the selected value onchange
function getSelectedValueOnChange(event) {
  // Get the selected radio button
  var selectedRadioButton = event.target;

  // Check if the selected radio button is checked
  if (selectedRadioButton.checked) {
      // Return the value of the selected radio button
      return selectedRadioButton.value;
  }

  return ''; // Return empty string if no radio button is selected
}

// Function to handle onchange event of radio buttons
function handleRadioChange(event) {
  var selectedValue = getSelectedValueOnChange(event);
  if(selectedValue === "loop"){
    document.querySelector("#loop_count_container").classList.remove('d-none')
  }else{
    document.querySelector("#loop_count_container").classList.contains('d-none') ? "" : document.querySelector("#loop_count_container").classList.add('d-none')
  }
}

// Add onchange event listener to all radio buttons
var radioButtons = document.getElementsByName('parallel_flow-loop_flow');
for (var i = 0; i < radioButtons.length; i++) {
  radioButtons[i].addEventListener('change', handleRadioChange);
}
